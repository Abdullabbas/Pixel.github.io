<!doctype html>
<html lang="en" class="light-theme">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixels | Sign Up</title>
    <link rel="icon" type="png" href="images/pixels_icon.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" class="theme dark-theme" href="css/global.css" />
    <link rel="stylesheet" href="css/signup.css" />
  </head>
  <body>
      <main class="main-content">
        <div class="container" id="container">
          <form id="form">
            <div class="form-head">
              <h1><i class="fa-solid fa-ghost"></i> Pixels</h1>
              <h3>Create an account</h3>
            </div>
            <div class="input-box">
              <input type="text" placeholder=" " name="email" />
              <label>Email Address</label>
              <!-- <i class="fa-solid fa-envelope" id="email"></i> -->
            </div>
            <div class="input-box">
              <input type="text" placeholder=" " name="user" />
              <label>Username</label>
              <!-- <i class="fa-solid fa-user" id="user"></i> -->
            </div>
            <div class="input-box">
              <input type="password" placeholder=" " name="pass" />
              <label>Password</label>

              <!-- <i class="fa-solid fa-key" id="key"></i> -->
            </div>
            <div class="input-box">
              <input
                type="password"
                placeholder=" "
                name="Cpass"
              />
              <label>Confirm Password</label>
              <!-- <i class="fa-solid fa-lock" id="lock"></i> -->
            </div>
            <div class="pass-checker">
              <p>
                <i class="fa-solid fa-star"></i> Password should be greater than
                4 and less than 20
              </p>
            </div>
            <input type="submit" class="login-btn" value="Sign Up" />
            <div class="have-acc">
              <p>Already have an account?</p>
              <a href="signin.html">Sign in</a>
            </div>
          </form>
        </div>
      </main>
    </div>
    <footer style="display: none;">
      <a class="logo" href="index.html"> Pixels </a>
      <p>&copy; 2026 Pixels | All rights reserved</p>
    </footer>
    <script src="js/global.js"></script>
    <script src="js/signup.js"></script>
  </body>
</html>
