<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixels | Support</title>
    <link rel="icon" type="png" href="images/pixels_icon.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" class="theme dark-theme" href="css/global.css" />
    <link rel="stylesheet" href="css/support.css" />
    <!-- Link Your Fucken CSS Here -->
  </head>
  <body>
    <div class="screen">
      <header>
        <nav class="nav-bar">
          <button class="nav-toggle">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </button>
          <div class="nav-logo">
            <a href="" class="logo">
              <i class="fa-solid fa-ghost"></i>
              <p>Pixels</p>
            </a>
          </div>
          <div class="lightnav-toggle">
            <i class="fa-solid fa-chevron-right"></i>
          </div>
          <ul class="nav-menu">
            <li>
              <a href="index.html">
                <i class="fa-solid fa-gamepad"></i>
                <p>Store</p>
              </a>
            </li>
            <li>
              <a href="browse.html">
                <i class="fa-solid fa-magnifying-glass"></i>
                <p>Browse</p>
              </a>
            </li>
            <li class="session-dependentLink">
              <a href="support.html">
                <i class="fa-solid fa-headset"></i>
                <p>Support</p>
              </a>
            </li>
            <li>
              <a href="news.html">
                <i class="fa-solid fa-newspaper"></i>
                <p>News</p>
              </a>
            </li>
            <div id="theme-container">
              <input type="checkbox" id="theme-btn" />
              <label for="theme-btn" class="theme-toggle">
                <i class="bi bi-sun-fill"></i>
                <i class="fa-solid fa-moon"></i>
              </label>
            </div>
          </ul>
          <div id="signin-userContainer">
            <a href="signin.html" class="sign-in">
              <i class="fa-solid fa-right-to-bracket"></i>
              <p>Sign in</p>
            </a>
          </div>
        </nav>
      </header>
      <main class="main-content">
        <div class="container">
          <form action="#" id="supportForm">
            <p class="pra">Welcome to Pixels Support</p>
            <h1><i class="fa-solid fa-ghost"></i> How can We help you?</h1>

            <div class="input-box">
              <input
                type="text"
                placeholder="E-Mail"
                id="emailInput"
                name="user"
              />
              <i class="fa-regular fa-envelope"></i>
            </div>

            <div class="input-box">
              <input
                class="in special"
                type="text"
                placeholder="Describe Your Problem Here"
                id="probInput"
                name="prob"
              />
              <i class="fa-solid fa-hand-holding-heart"></i>
            </div>
            <div id="validation-msg"></div>

            <input type="submit" class="login-btn" value="SEND" />
          </form>
        </div>
      </main>
    </div>
    <footer>
      <div class="foot">
        <a class="logo" href="index.html"> Pixels </a>
        <p>&copy; 2026 Pixels | All rights reserved</p>
      </div>
      <a href="about_us.html" class="about"> About us </a>
    </footer>
    <script src="js/global.js"></script>
    <script src="js/games_data.js"></script>
    <script src="js/support.js"></script>
  </body>
</html>
