<!doctype html>
<html lang="en" class="sign-in-up">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="icon" type="png" href="images/pixels_icon.svg" />
    <link rel="stylesheet" class="theme dark-theme" href="css/global.css" />
    <link rel="stylesheet" href="css/signin.css" />
    <title>Pixels | Sign In</title>
  </head>
  <body>
    <main>
      <div class="container">
        <form id="form">
          <h1>
            <i class="fa-solid fa-ghost"></i> Sign In To <span>Pixels</span>
          </h1>
          <div class="input-box">
            <input type="text" placeholder=" " name="user" />
            <label>Email Address</label>
          </div>
          <div class="input-box">
            <input type="password" placeholder=" " name="pass" />
            <label>Password</label>
            <div class="forget" style="display: none">
              <a href="#">Forgot Password?</a>
            </div>
          </div>
          <input type="submit" class="login-btn" value="Sign In" />
          <div class="register">
            <p>New Here?</p>
            <a href="signup.html">Create an account</a>
          </div>
        </form>
      </div>
    </main>
    <script src="js/global.js"></script>
    <script src="js/signin.js"></script>
  </body>
</html>
